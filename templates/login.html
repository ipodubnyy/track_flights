<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t('sign_in_google') }} - {{ t('app_name') }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .login-container { display: flex; justify-content: center; align-items: center; min-height: 80vh; }
        .login-card { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 100%; }
        .login-card h1 { font-size: 1.5rem; margin-bottom: 8px; }
        .login-card p { color: #64748b; margin-bottom: 24px; }
        .google-btn { display: inline-flex; align-items: center; gap: 10px; padding: 12px 24px; background: #fff; border: 1px solid #dadce0; border-radius: 6px; font-size: 0.95rem; font-weight: 500; color: #3c4043; cursor: pointer; text-decoration: none; transition: box-shadow 0.15s; font-family: inherit; }
        .google-btn:hover { box-shadow: 0 1px 4px rgba(0,0,0,0.2); }
        .google-btn svg { width: 20px; height: 20px; }
        .error { color: #dc2626; margin-bottom: 16px; font-size: 0.9rem; }
        .lang-switch { margin-top: 20px; font-size: 0.82rem; color: #94a3b8; }
        .lang-switch a { color: #6366f1; text-decoration: none; }
        .lang-switch a:hover { text-decoration: underline; }
        .lang-switch a.active { font-weight: 700; }
    </style>
</head>
<body>
    <nav>
        <span class="logo"><img src="/static/logo.png" alt="{{ t('app_name') }}" class="logo-img"><span class="logo-text">{{ t('app_name') }}</span></span>
    </nav>
    <main>
        <div class="login-container">
            <div class="login-card">
                <h1>{{ t('welcome_to') }}</h1>
                <p>{{ t('sign_in_prompt') }}</p>
                {% if error %}
                <div class="error">{{ error }}</div>
                {% endif %}
                <a href="/login/google" class="google-btn">
                    <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                    {{ t('sign_in_google') }}
                </a>
                <div class="lang-switch">
                    <a href="/login?lang=en" class="{% if lang == 'en' %}active{% endif %}">English</a>
                    &middot;
                    <a href="/login?lang=ru" class="{% if lang == 'ru' %}active{% endif %}">Русский</a>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
