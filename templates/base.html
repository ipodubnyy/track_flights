<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Flight Price Tracker{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav>
        <a href="/" class="logo">Flight Tracker</a>
        {% if user %}
        <div class="nav-right">
            <div class="currency-toggle">
                <button class="currency-btn{% if currency == 'USD' %} active{% endif %}" onclick="setCurrency('USD')">$ USD</button>
                <button class="currency-btn{% if currency == 'RUB' %} active{% endif %}" onclick="setCurrency('RUB')">&#8381; RUB</button>
            </div>
            <div class="nav-user">
                {% if user.picture %}<img src="{{ user.picture }}" class="avatar" alt="">{% endif %}
                <span class="nav-name">{{ user.name }}</span>
                <a href="/logout" class="nav-link">Sign out</a>
                <a href="#" class="nav-link nav-danger" onclick="if(confirm('Delete all your data and sign out?')){fetch('/profile',{method:'DELETE'}).then(()=>location.href='/login')}">Delete profile</a>
            </div>
        </div>
        {% endif %}
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p>Prices are shown in {% if currency == 'RUB' %}Russian Rubles (&#8381;){% else %}US Dollars ($){% endif %}. Totals include all travelers.</p>
    </footer>
    <script src="/static/app.js"></script>
</body>
</html>
