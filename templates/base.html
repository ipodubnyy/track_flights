<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Flight Price Tracker{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav>
        <a href="/" class="logo">Flight Price Tracker</a>
        {% if user %}
        <div class="nav-user">
            {% if user.picture %}<img src="{{ user.picture }}" class="avatar" alt="">{% endif %}
            <span class="nav-name">{{ user.name }}</span>
            <a href="/logout" class="nav-logout">Sign out</a>
            <a href="#" class="nav-logout nav-danger" onclick="if(confirm('Delete all your data and sign out?')){fetch('/profile',{method:'DELETE'}).then(()=>location.href='/login')}">Delete profile</a>
        </div>
        {% endif %}
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
    <script src="/static/app.js"></script>
</body>
</html>
