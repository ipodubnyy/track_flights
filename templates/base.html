<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Flight Price Tracker{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav>
        <a href="/" class="logo">Flight Tracker</a>
        {% if user %}
        <div class="nav-right">
            <div class="currency-toggle">
                <button class="currency-btn{% if currency == 'USD' %} active{% endif %}" onclick="setCurrency('USD')">$ USD</button>
                <button class="currency-btn{% if currency == 'RUB' %} active{% endif %}" onclick="setCurrency('RUB')">&#8381; RUB</button>
            </div>
            <div class="user-menu">
                <button class="user-menu-btn" onclick="this.parentElement.classList.toggle('open')">
                    {% if user.picture %}<img src="{{ user.picture }}" class="avatar" alt="">{% endif %}
                    <span>{{ user.name }}</span>
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><path d="M3 5l3 3 3-3"/></svg>
                </button>
                <div class="user-dropdown">
                    <a href="#" onclick="event.preventDefault();fetch('/logout',{method:'POST',headers:{'x-csrf-token':getCsrfToken()}}).then(function(){location.href='/login'})">Sign out</a>
                    <a href="#" class="dropdown-danger" onclick="event.preventDefault();if(confirm('Delete all your data and sign out?')){fetch('/profile',{method:'DELETE',headers:{'x-csrf-token':getCsrfToken()}}).then(()=>location.href='/login')}">Delete profile</a>
                </div>
            </div>
        </div>
        {% endif %}
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p>Prices are shown in {% if currency == 'RUB' %}Russian Rubles (&#8381;){% else %}US Dollars ($){% endif %}. Totals include all travelers.</p>
    </footer>
    <script src="/static/app.js"></script>
</body>
</html>
