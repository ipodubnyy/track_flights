server {
    listen 5498 ssl;
    server_name flights.cattom.net;

    ssl_certificate /etc/letsencrypt/live/flights.cattom.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flights.cattom.net/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }

    location /static/ {
        alias /opt/track_flights/static/;
        expires 1d;
    }
}
